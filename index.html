<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Convertisseur d'Heures — WPInfo24</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-blue">

<div class="screen">
  <div class="card">

    <!-- Sélecteur de thème -->
    <div class="theme-menu">
      <button class="theme-toggle" id="themeToggle" aria-label="Choisir un thème" title="Couleur du thème">
        🎨
      </button>
      <div class="theme-options" id="themeOptions">
        <button class="theme-dot dot-blue  active" data-theme="blue"  title="Bleu"  aria-label="Thème bleu"></button>
        <button class="theme-dot dot-green"         data-theme="green" title="Vert"  aria-label="Thème vert"></button>
        <button class="theme-dot dot-red"           data-theme="red"   title="Rouge" aria-label="Thème rouge"></button>
      </div>
    </div>

    <!-- En-tête -->
    <div class="header">
      <div class="icon-wrap">🕐</div>
      <h1>Convertisseur d'Heures</h1>
      <div class="subtitle" id="subtitleLabel">Décimal → Heures &amp; Minutes</div>
    </div>

    <!-- Champ d'entrée -->
    <div class="field">
      <label id="inputLabel">Heure décimale</label>
      <div class="input-wrap">
        <input
          type="number"
          id="inputValue"
          placeholder="ex : 7.75"
          min="0"
          step="0.01"
          inputmode="decimal"
          autofocus
        >
        <span class="unit" id="inputUnit">h</span>
      </div>
    </div>

    <!-- Flèche séparatrice -->
    <div class="arrow-divider">↓</div>

    <!-- Champ résultat -->
    <div class="field">
      <label>Résultat</label>
      <div class="input-wrap">
        <div class="result-box" id="resultBox">
          <span class="placeholder-text" id="resultPlaceholder">—</span>
          <span class="result-text"      id="resultText"        style="display:none"></span>
        </div>
        <span class="unit" id="resultUnit" style="display:none"></span>
      </div>
    </div>

    <!-- Bouton convertir (bascule de mode) -->
    <button class="btn-convert" id="btnConvert">Convertir</button>

    <!-- Exemples -->
    <div class="info" id="infoExamples">
      Ex : 7,75 h &nbsp;→&nbsp; 7 h 45 min<br>
      Ex : 1,5 h &nbsp;→&nbsp; 1 h 30 min
    </div>

    <!-- Logo WPInfo24 -->
    <div class="logo-wrap">
      <img src="logo_wpinfo24.png" alt="WPInfo24" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
      <span class="logo-fallback" style="display:none">WPInfo24</span>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
