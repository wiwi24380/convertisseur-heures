<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Convertisseur d'Heures</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen">
  <div class="card">

    <div class="header">
      <div class="icon-wrap">🕐</div>
      <h1>Convertisseur d'Heures</h1>
      <div class="subtitle">Décimal → Heures &amp; Minutes</div>
    </div>

    <div class="field">
      <label>Heure décimale</label>
      <div class="input-wrap">
        <input
          type="number"
          id="inputDecimal"
          placeholder="ex : 7.75"
          min="0"
          step="0.01"
          inputmode="decimal"
          autofocus
        >
        <span class="unit">h</span>
      </div>
    </div>

    <div class="arrow-divider">↓</div>

    <div class="field">
      <label>Résultat</label>
      <div class="input-wrap">
        <div class="result-box" id="resultBox">
          <span class="placeholder-text" id="resultPlaceholder">—</span>
          <span class="result-text" id="resultText" style="display:none"></span>
        </div>
        <span class="unit" id="resultUnit" style="display:none">h min</span>
      </div>
    </div>

    <button class="btn-convert" onclick="convert()">Convertir</button>

    <div class="info">
      Ex : 7,75 h &nbsp;→&nbsp; 7 h 45 min<br>
      Ex : 1,5 h &nbsp;→&nbsp; 1 h 30 min
    </div>

  </div>
</div>


  <script src="script.js"></script>

</body>
</html>
